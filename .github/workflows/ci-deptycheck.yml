---
name: DepTyCheck

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:
    branches:
      - main
      - master
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  schedule:
    # We want to run in the beginning of the day, right after the `pack` collection is built at the end of the previous day.
    - cron: "0 1 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}@${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  pack_dir_file: pack-dir.tar

# TODO to reduce duplication, e.g. by using https://docs.github.com/en/actions/using-workflows/reusing-workflows

jobs:

  ##############
  # Validation #
  ##############

  validate_trigger:
    name: Validate trigger
    # Disable scheduled running on forks and PRs from the same repo
    if: github.event_name != 'schedule' && github.event_name != 'pull_request' ||
        github.event_name == 'schedule' && github.repository_owner == 'buzden' ||
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest
    steps:
      - name: No-op step
        run: echo "This job exists only for validation."

  ################
  # Preparations #
  ################

  prepare-pack:
    name: Prepare `pack` (${{ matrix.os }})
    needs: validate_trigger
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked

      - uses: ./.github/actions/setup-pack-host
        with:
          install-pack: 'true'

      - run: pack update-db
      - name: Switch to appropriate `pack` collection
        run: pack switch "$( if [[ '${{ github.event_name }}' == 'schedule' ]]; then echo HEAD; else ./.pack-collection; fi )"
      - run: ./.patch-chez-gc-handler idris2

      - name: Sanity check
        run: pack help && idris2 --version

      - name: Debug env
        run: |
          echo "=== PACK_*DIR vars ==="
          echo "PACK_USER_DIR=${PACK_USER_DIR:-(unset)}"
          echo "PACK_STATE_DIR=${PACK_STATE_DIR:-(unset)}"
          echo "PACK_CACHE_DIR=${PACK_CACHE_DIR:-(unset)}"
          echo "PACK_BIN_DIR=${PACK_BIN_DIR:-(unset)}"
          echo "=== GITHUB_ENV contents ==="
          cat "$GITHUB_ENV" || echo "(empty)"
          echo "=== Binary locations ==="
          which pack 2>/dev/null && ls -la "$(which pack)" || echo "pack not in PATH"
          which idris2 2>/dev/null && ls -la "$(which idris2)" || echo "idris2 not in PATH"
          echo "=== Candidate dirs ==="
          for d in "$HOME/.pack" "$HOME/.cache/pack" "$HOME/.config/pack" "$HOME/.local" "$HOME/.idris2"; do
            du -sh "$d" 2>/dev/null && echo "  ^ $d" || echo "missing: $d"
          done

      - name: Tar the `pack` dir
        run: .github/tar-pack save-pack "${{ env.pack_dir_file }}"
      - name: Save state of `pack`
        uses: actions/upload-artifact@v7
        with:
          name: pack-dir-${{ matrix.os }}
          path: ${{ env.pack_dir_file }}

  thirdparties-build:
    name: Build thirdparties (${{ matrix.os }})
    needs:
      - prepare-pack
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked

      - uses: ./.github/actions/setup-pack-host

      - name: Restore state of `pack`
        uses: actions/download-artifact@v7
        with:
          name: pack-dir-${{ matrix.os }}
      - name: Untar the `pack` dir
        run: .github/tar-pack restore "${{ env.pack_dir_file }}"

      - name: Sanity check
        run: pack help && idris2 --version

      - run: pack install-deps deptycheck
      - run: pack install summary-stat # for distr tests
             # TODO to compute test dependencies when we have special mini-test libs

      - name: Tar the `pack` dir
        run: .github/tar-pack save-pack "${{ env.pack_dir_file }}"
      - name: Save built thirdparties
        uses: actions/upload-artifact@v7
        with:
          name: built-thirdparties-${{ matrix.os }}
          path: ${{ env.pack_dir_file }}

  ########################
  # Test elab-util-extra #
  ########################

  elab-util-extra-test:
    name: Test elab-util-extra
    needs:
      - prepare-pack
      - thirdparties-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked

      - uses: ./.github/actions/setup-pack-host

      - name: Restore built thirdparties
        uses: actions/download-artifact@v6
        with:
          name: built-thirdparties-ubuntu-latest
      - name: Untar the `pack` dir
        run: .github/tar-pack restore "${{ env.pack_dir_file }}"

      - name: Sanity check
        run: pack help && idris2 --version

      - run: pack test elab-util-extra

  ############################
  # Build DepTyCheck library #
  ############################

  deptycheck-build-lib:
    name: Build the lib (${{ matrix.os }})
    needs:
      - prepare-pack
      - thirdparties-build
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked

      - uses: ./.github/actions/setup-pack-host

      - name: Restore built thirdparties
        uses: actions/download-artifact@v7
        with:
          name: built-thirdparties-${{ matrix.os }}
      - name: Untar the `pack` dir
        run: .github/tar-pack restore "${{ env.pack_dir_file }}"

      - name: Sanity check
        run: pack help && idris2 --version

      - run: pack build deptycheck
      - run: pack install deptycheck

      - name: Tar the `pack` dir
        run: .github/tar-pack save-pack "${{ env.pack_dir_file }}"
      - name: Tar built TTC files
        run: find "$(pwd)" -name '*.tt[cm]' | .github/tar-pack save-stdin "${{ env.pack_dir_file }}"
      - name: Save built DepTyCheck
        uses: actions/upload-artifact@v7
        with:
          name: built-deptycheck-${{ matrix.os }}
          path: ${{ env.pack_dir_file }}

  ###########################
  # Build DepTyCheck's docs #
  ###########################

  deptycheck-build-docs:
    name: Build the docs
    needs: validate_trigger
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked
      - uses: actions/setup-python@v6
      - name: Install dependencies
        run: python -m pip install sphinx -r docs/requirements.txt
      - run: alias sh=bash
      # - run: pack build docs # `pack` is unaccessible here, thus:
      - run: cd docs && eval "$(grep prebuild docs.ipkg | sed 's/.*"\(.*\)"/\1/')"

  ###################
  # Test DepTyCheck #
  ###################

  get-test-sets:
    name: Acquire test sets
    needs: validate_trigger
    runs-on: ubuntu-latest
    outputs:
      test-sets: ${{ steps.get-test-sets.outputs.test-sets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked
      - name: Get test sets
        id: get-test-sets
        run: |
          (
          echo -n "test-sets=["
          find tests/ -type f,l -name run | grep -v '/_' | \
            sed -e 's|^tests/|"|' -e 's|\(.*\)distribution/\([^-]*\)-[^/]*/run|\1distribution/\2-"|' -e 's|/[^/]*/run$|"|' | \
            sort | uniq | awk 'ORS=", "' | head -c -2
          echo "]"
          ) >> "$GITHUB_OUTPUT"

  deptycheck-test:
    name: Test the lib (${{ matrix.os }}, ${{ matrix.test_set }})
    needs:
      - prepare-pack
      - deptycheck-build-lib
      - get-test-sets
    runs-on: ${{ matrix.os }}
    env:
      NUM_THREADS: 2
    strategy:
      fail-fast: false # all test cases are more or less independent
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        test_set: ${{ fromJSON(needs.get-test-sets.outputs.test-sets) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked

      - uses: ./.github/actions/setup-pack-host

      - name: Restore built DepTyCheck
        uses: actions/download-artifact@v7
        with:
          name: built-deptycheck-${{ matrix.os }}
      - name: Untar the `pack` dir
        run: .github/tar-pack restore "${{ env.pack_dir_file }}"

      - name: Sanity check
        run: pack help && idris2 --version

      - name: Sleep a random bit
        run: sleep "$(shuf -i 0-10 -n 1)"
      
      - name: Diagnose chez/idris2 platform
        run: |
          echo "=== chez ==="
          SCHEME="$(command -v scheme || command -v chez || command -v chezscheme || true)"
          echo "scheme binary: ${SCHEME:-NOT FOUND}"
          "$SCHEME" --version 2>&1 || true
          echo '(display (machine-type)) (newline)' | "$SCHEME" -q || true
          echo "=== idris2 ==="
          idris2 --version
          echo "=== runner ==="
          uname -a
          sw_vers
          arch
          
      - name: Run tests for ${{ matrix.test_set }}
        run: pack test deptycheck "${TEST_SET}"
        env:
          TEST_SET: ${{ matrix.test_set }}

  #################
  # Test examples #
  #################

  get-examples:
    name: Acquire examples
    needs: validate_trigger
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.get-examples.outputs.examples }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked
      - name: Get examples
        id: get-examples
        run: |
          (
          echo -n "examples=["
          find examples/ -mindepth 1 -maxdepth 1 -type d | \
            sed 's|^examples/|"|' | sed 's|$|"|' | \
            sort | uniq | awk 'ORS=", "' | head -c -2
          echo "]"
          ) >> "$GITHUB_OUTPUT"

  examples-build:
    name: Build and test examples
    needs:
      - prepare-pack
      - deptycheck-build-lib
      - get-examples
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # all test cases are more or less independent
      matrix:
        example: ${{ fromJSON(needs.get-examples.outputs.examples) }}
    env:
      EXAMPLE_NAME: ${{ matrix.example }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false # https://docs.zizmor.sh/audits/#artipacked

      - uses: ./.github/actions/setup-pack-host

      - name: Restore built DepTyCheck
        uses: actions/download-artifact@v7
        with:
          name: built-deptycheck-ubuntu-latest
      - name: Untar the `pack` dir
        run: .github/tar-pack restore "${{ env.pack_dir_file }}"

      - name: Sanity check
        run: pack help && idris2 --version

      - name: Sleep a random bit
        run: sleep "$(shuf -i 0-10 -n 1)"

      - name: Build ${{ matrix.example }}
        run: pack build "${EXAMPLE_NAME}"
      - name: Test ${{ matrix.example }}
        run: pack test "${EXAMPLE_NAME}"
