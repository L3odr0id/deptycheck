---
name: Setup host for pack
description: Install Chez Scheme + GMP on the runner; optionally install pack from scratch
inputs:
  install-pack:
    description: '"true" = run pack install.bash; "false" = expect pack restored from artifact'
    required: false
    default: 'false'
  collection:
    description: 'Collection to switch to; empty = skip switch'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Install system deps (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y git chezscheme bash make gcc libgmp3-dev coreutils

    - name: Install system deps (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: brew install coreutils gmp chezscheme flock

    - name: Install pack (full, non-interactive)
      if: inputs.install-pack == 'true'
      shell: bash
      env:
        SCHEME: ${{ runner.os == 'macOS' && 'chez' || 'scheme' }}
      run: |
        # install.bash prompts for scheme name via `read -p`; feed it on stdin.
        # Download first so the pipe doesn't steal stdin from the script.
        curl -fsSL https://raw.githubusercontent.com/stefan-hoeck/idris2-pack/main/install.bash -o /tmp/pack-install.bash
        bash /tmp/pack-install.bash <<<"$SCHEME"

    - name: Export PATH
      shell: bash
      run: |
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "$HOME/.idris2/bin" >> "$GITHUB_PATH"

    - name: Switch collection
      if: inputs.collection != ''
      shell: bash
      run: pack switch "${{ inputs.collection }}"
